services:
  postgres:
    image: postgres:16-alpine
    container_name: fluir-atendente-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fluir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fluir_atendente_ia}
    volumes:
      - fluir_atendente_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fluir} -d ${POSTGRES_DB:-fluir_atendente_ia}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fluir_atendente

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluir-atendente-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-fluir}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-fluir_atendente_ia}?schema=public
      APP_URL: https://atendenteia.fluirtecnologia.com.br
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "127.0.0.1:${APP_PORT:-3010}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - fluir_atendente

  waha:
    image: devlikeapro/waha:latest
    container_name: fluir-atendente-waha
    restart: unless-stopped
    profiles: ["waha"]
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_HOOK_URL: https://n8n.gtmalimentos.com.br/webhook/atendente-ia/inbound
      WHATSAPP_HOOK_EVENTS: message
    ports:
      - "127.0.0.1:${WAHA_PORT:-3011}:3000"
    volumes:
      - fluir_waha_sessions:/app/.sessions
    networks:
      - fluir_atendente

volumes:
  fluir_atendente_postgres_data:
  fluir_waha_sessions:

networks:
  fluir_atendente:
    name: fluir_atendente
